kind = "web"
previewPath = "/"
title = "YMKCOE College Website"
version = "1.0.0"
id = "artifacts/ymkcoe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18180

[services.development]
run = "pnpm --filter @workspace/ymkcoe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ymkcoe", "run", "build" ]
publicDir = "artifacts/ymkcoe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18180"
BASE_PATH = "/"
